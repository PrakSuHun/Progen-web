<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 신청 마감</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  body { background-color: #05070A; color: #F8FAFC; -webkit-font-smoothing: antialiased; word-break: keep-all; letter-spacing: -0.02em; }
  .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
</style>
</head>
<body class="selection:bg-ai-primary selection:text-white">

<!-- 네비게이션 바 -->
<nav class="w-full glass border-b border-white/5 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./index.html" class="font-black text-2xl italic flex items-center">
      <span class="text-white tracking-tight uppercase">PRO</span><span class="text-ai-primary tracking-tight uppercase">GEN</span>
    </a>
    <a href="./index.html" class="text-gray-400 hover:text-white text-sm font-bold flex items-center gap-2 transition-colors">
      <i class="fa-solid fa-house"></i> 홈으로
    </a>
  </div>
</nav>

<!-- 메인 콘텐츠 (중앙 정렬) -->
<main class="max-w-2xl mx-auto px-6 min-h-[calc(100vh-4rem)] flex items-center justify-center pb-20 pt-10">
  
  <div class="w-full glass p-10 md:p-14 rounded-[2rem] text-center border-t-4 border-t-ai-primary shadow-2xl relative overflow-hidden">
    <!-- 배경 효과 -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-32 bg-ai-primary/20 blur-[60px] pointer-events-none"></div>

    <!-- 아이콘 -->
    <div class="w-20 h-20 md:w-24 md:h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-8 border border-white/10 shadow-inner relative z-10">
      <i class="fa-solid fa-calendar-xmark text-4xl md:text-5xl text-gray-400"></i>
    </div>

    <!-- 텍스트 안내 -->
    <div class="space-y-4 mb-10 relative z-10">
      <h1 class="text-3xl md:text-4xl font-black text-white">클래스 신청이 <br class="md:hidden"/><span class="text-transparent bg-clip-text bg-gradient-to-r from-ai-primary to-ai-secondary">마감되었습니다</span></h1>
      <p class="text-gray-400 text-[15px] md:text-lg leading-relaxed">
        예상보다 많은 분들이 지원해 주셔서 준비된 좌석이 <strong class="text-gray-200">조기 마감</strong>되었습니다.<br class="hidden md:block"/>
        PROGEN에 보내주신 뜨거운 관심과 성원에 진심으로 감사드립니다.
      </p>
      <p class="text-gray-500 text-sm md:text-base mt-2">
        다음 기회에 더 좋은 프로그램으로 찾아뵙겠습니다.
      </p>
    </div>

    <!-- 버튼 -->
    <a href="./index.html" class="inline-flex items-center justify-center gap-2 w-full md:w-auto px-8 py-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-xl transition-all hover:-translate-y-1 relative z-10">
      <i class="fa-solid fa-arrow-left"></i>
      메인 페이지로 돌아가기
    </a>
  </div>

</main>

</body>
</html>
