<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 클래스 신청하기</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  body { background-color: #05070A; color: #F8FAFC; -webkit-font-smoothing: antialiased; word-break: keep-all; letter-spacing: -0.02em; }
  .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
  .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.875rem 1rem; color: white; transition: all 0.3s; }
  .input-field:focus { outline: none; border-color: #6366F1; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
  .input-field::placeholder { color: #6B7280; }
  select.input-field { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; padding-right: 2.5rem; }
  select.input-field option { background-color: #111827; color: white; }
  .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="selection:bg-ai-primary selection:text-white pb-20">

<nav class="w-full glass border-b border-white/5 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./index.html" class="font-black text-2xl italic flex items-center">
      <span class="text-white tracking-tight uppercase">PRO</span><span class="text-ai-primary tracking-tight uppercase">GEN</span>
    </a>
    <a href="./index.html" class="text-gray-400 hover:text-white text-sm font-bold flex items-center gap-2 transition-colors">
      <i class="fa-solid fa-arrow-left"></i> 돌아가기
    </a>
  </div>
</nav>

<main class="max-w-2xl mx-auto px-6 pt-12">
  <div class="text-center mb-10">
    <h1 class="text-3xl md:text-4xl font-black mb-4">클래스 신청서 작성</h1>
    <p class="text-gray-400">AI 시대, 대학생으로 살아남기 프로젝트에 합류하세요!</p>
  </div>

  <!-- 행사 요약 정보 -->
  <div class="mb-10">
    <div class="glass p-5 md:p-6 rounded-2xl border-ai-primary/30 flex flex-row items-center justify-center gap-6 md:gap-12 bg-white/5 border border-white/10 shadow-lg divide-x divide-white/10">
      <div class="flex flex-col items-center text-center px-2 w-1/2">
        <p class="text-[11px] md:text-xs text-ai-primary font-bold uppercase tracking-widest mb-2 flex items-center gap-1.5">
          <i class="fa-solid fa-calendar-check"></i> 행사 일시
        </p>
        <p class="text-[15px] md:text-lg font-black text-white">03. 28 (토) <span class="block md:inline mt-0.5 md:mt-0 text-[14px] md:text-lg">오후 2시</span></p>
      </div>
      <div class="flex flex-col items-center text-center px-2 w-1/2">
        <p class="text-[11px] md:text-xs text-ai-secondary font-bold uppercase tracking-widest mb-2 flex items-center gap-1.5">
          <i class="fa-solid fa-location-dot"></i> 장소
        </p>
        <p class="text-[14px] md:text-lg font-black text-white break-keep">충남대학교 경상대학 우림홀</p>
      </div>
    </div>
  </div>

  <form id="applyForm" class="space-y-8">
    
    <!-- 1. 기본 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5">
      <h2 class="text-xl font-bold text-white flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
        <i class="fa-solid fa-user text-ai-primary"></i> 기본 정보
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">이름 <span class="text-red-500">*</span></label>
          <input type="text" id="name" required placeholder="홍길동" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">만 나이 <span class="text-red-500">*</span></label>
          <input type="number" id="age" required placeholder="21" min="15" max="99" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">연락처 <span class="text-red-500">*</span></label>
          <input type="tel" id="phone" required placeholder="010-0000-0000" maxlength="13" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">성별 <span class="text-red-500">*</span></label>
          <select id="gender" required class="input-field">
            <option value="" disabled selected>선택해주세요</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>
      </div>
    </section>

    <!-- 2. 학교 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5">
      <h2 class="text-xl font-bold text-white flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
        <i class="fa-solid fa-school text-ai-secondary"></i> 학교 정보
      </h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">학교명 <span class="text-red-500">*</span></label>
          <select id="school" required class="input-field">
            <option value="" disabled selected>학교를 선택해주세요</option>
            <option value="카이스트">카이스트</option>
            <option value="충남대학교">충남대학교</option>
            <option value="한밭대학교">한밭대학교</option>
            <option value="한남대학교">한남대학교</option>
            <option value="목원대학교">목원대학교</option>
            <option value="배재대학교">배재대학교</option>
            <option value="대전대학교">대전대학교</option>
            <option value="우송대학교">우송대학교</option>
            <option value="건양대학교">건양대학교</option>
            <option value="을지대학교">을지대학교</option>
            <option value="대전과학기술대학교">대전과학기술대학교</option>
            <option value="대전보건대학교">대전보건대학교</option>
            <option value="우송정보대학교">우송정보대학교</option>
            <option value="한국폴리텍">한국폴리텍</option>
          </select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-bold text-gray-300 mb-2">전공(학과) <span class="text-red-500">*</span></label>
            <input type="text" id="major" required placeholder="컴퓨터공학과" class="input-field">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-300 mb-2">학년 (2026년 기준) <span class="text-red-500">*</span></label>
            <select id="grade" required class="input-field">
              <option value="" disabled selected>선택해주세요</option>
              <option value="1학년 (26학번)">1학년 (26학번)</option>
              <option value="2학년">2학년</option>
              <option value="3학년">3학년</option>
              <option value="4학년">4학년</option>
              <option value="휴학/졸업유예">휴학/졸업유예</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- 3. 추가 정보 -->
    <section class="glass p-6 md:p-8 rounded-3xl space-y-5">
      <h2 class="text-xl font-bold text-white flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
        <i class="fa-solid fa-list-check text-ai-accent"></i> 추가 정보
      </h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">대외활동 및 관련 이력 (선택)</label>
          <textarea id="history" rows="3" placeholder="참여했던 동아리, 대외활동, 공모전 등이 있다면 자유롭게 적어주세요. (없다면 비워두셔도 됩니다)" class="input-field resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">신청 경로 <span class="text-red-500">*</span></label>
          <select id="path" required class="input-field">
            <option value="" disabled selected>어떻게 알고 오셨나요?</option>
            <option value="에브리타임">에브리타임</option>
            <option value="인스타그램">인스타그램</option>
            <option value="학교 내 오프라인 포스터/현수막">학교 내 오프라인 포스터/현수막</option>
            <option value="지인 추천(선배·후배·동기)">지인 추천 (선배·후배·동기)</option>
            <option value="학과/학교 공지사항 및 단톡방">학과/학교 공지사항 및 단톡방</option>
            <option value="대외활동 플랫폼(링커리어·캠퍼스픽 등)">대외활동 플랫폼 (링커리어·캠퍼스픽 등)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- 4. 안내 및 동의 -->
    <section class="glass p-6 md:p-8 rounded-3xl border-ai-primary/30 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-ai-primary to-ai-secondary"></div>

      <div class="bg-black/50 p-5 rounded-xl border border-white/5 mb-6">
        <h3 class="font-bold text-sm text-gray-300 mb-2 flex items-center gap-2"><i class="fa-solid fa-bullhorn text-ai-primary"></i> 참가 안내</h3>
        <ul class="text-xs text-gray-400 space-y-1.5 list-disc pl-4">
          <li>본 행사는 <strong class="text-ai-primary">전액 무료</strong>로 진행됩니다.</li>
          <li>원활한 행사 준비 및 노쇼 방지를 위해 <strong class="text-red-400">참석이 어려우신 경우 반드시 사전 연락</strong> 부탁드립니다.</li>
          <li>클래스 확정 및 상세 안내는 행사 진행 주간에 문자로 일괄 발송됩니다.</li>
        </ul>
      </div>

      <label class="flex items-start gap-3 cursor-pointer group">
        <div class="relative flex items-center justify-center mt-0.5">
          <input type="checkbox" id="agree" required class="peer appearance-none w-5 h-5 border-2 border-gray-500 rounded bg-transparent checked:bg-ai-primary checked:border-ai-primary transition-all cursor-pointer">
          <i class="fa-solid fa-check absolute text-white text-xs opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
        </div>
        <div class="text-sm text-gray-300 group-hover:text-white transition-colors">
          <span class="font-bold text-ai-primary">[필수]</span> 개인정보 수집 및 이용 동의<br>
          <span class="text-xs text-gray-500 mt-1 block">PROGEN 행사 운영, 본인 확인 및 안내 문자 발송을 위해 이름, 나이, 연락처, 학교 정보 등을 수집합니다. 수집된 정보는 행사 종료 후 1개월 이내에 안전하게 파기됩니다.</span>
        </div>
      </label>
    </section>

    <!-- 제출 버튼 -->
    <button type="submit" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-ai-primary to-ai-secondary text-white font-black text-xl rounded-2xl hover:shadow-[0_10px_30px_rgba(99,102,241,0.4)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2">
      <span id="btnText">신청 완료하기</span>
      <div id="btnLoader" class="loader" style="width:20px;height:20px;border-width:2.5px;"></div>
    </button>
  </form>
</main>

<script>
  document.getElementById('phone').addEventListener('input', function(e) {
    let number = e.target.value.replace(/[^0-9]/g, "");
    let phone = "";
    if (number.length < 4) { phone = number; } 
    else if (number.length < 7) { phone = number.substr(0, 3) + "-" + number.substr(3); } 
    else if (number.length < 11) { phone = number.substr(0, 3) + "-" + number.substr(3, 3) + "-" + number.substr(6); } 
    else { phone = number.substr(0, 3) + "-" + number.substr(3, 4) + "-" + number.substr(7, 4); }
    e.target.value = phone;
  });

  document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    btnText.innerText = '제출 중...';
    btnLoader.style.display = 'block';

    const formData = {
      name: document.getElementById('name').value,
      age: parseInt(document.getElementById('age').value, 10),
      phone: document.getElementById('phone').value,
      gender: document.getElementById('gender').value,
      school: document.getElementById('school').value,
      major: document.getElementById('major').value,
      grade: document.getElementById('grade').value,
      history: document.getElementById('history').value,
      path: document.getElementById('path').value,
      agree: document.getElementById('agree').checked
    };

    try {
      const response = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      const result = await response.json();

      if (response.ok) {
        alert('🎉 신청이 완벽하게 접수되었습니다! 행사 진행 주간에 안내 문자를 보내드릴게요.');
        window.location.href = './index.html'; 
      } else {
        alert('신청 처리 중 오류가 발생했습니다: ' + (result.message || '알 수 없는 오류'));
      }
    } catch (error) {
      console.error('Error:', error);
      alert('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      btnText.innerText = '신청 완료하기';
      btnLoader.style.display = 'none';
    }
  });
</script>
</body>
</html>
